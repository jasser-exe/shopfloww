<div class="login-container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
    <h2>Login</h2>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Enter your email"
      />
      <small *ngIf="form.get('email')?.hasError('required')" class="error">
        Email is required
      </small>
      <small *ngIf="form.get('email')?.hasError('email')" class="error">
        Invalid email format
      </small>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Enter your password"
      />
      <small *ngIf="form.get('password')?.hasError('required')" class="error">
        Password is required
      </small>
    </div>

    <div *ngIf="error" class="error-message">{{ error }}</div>

    <button type="submit" [disabled]="!form.valid || loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="register-link">
      Don't have an account?
      <a routerLink="/register">Register here</a>
    </p>
  </form>
</div>
