<div class="register-container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="register-form">
    <h2>Register</h2>

    <div class="form-group">
      <label for="firstName">First Name</label>
      <input id="firstName" type="text" formControlName="firstName" placeholder="First name" />
      <small *ngIf="form.get('firstName')?.hasError('required')" class="error">
        First name is required
      </small>
    </div>

    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input id="lastName" type="text" formControlName="lastName" placeholder="Last name" />
      <small *ngIf="form.get('lastName')?.hasError('required')" class="error">
        Last name is required
      </small>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Enter your email" />
      <small *ngIf="form.get('email')?.hasError('required')" class="error">
        Email is required
      </small>
      <small *ngIf="form.get('email')?.hasError('email')" class="error">
        Invalid email format
      </small>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Enter your password" />
      <small *ngIf="form.get('password')?.hasError('required')" class="error">
        Password is required
      </small>
      <small *ngIf="form.get('password')?.hasError('minlength')" class="error">
        Password must be at least 6 characters
      </small>
    </div>

    <div *ngIf="error" class="error-message">{{ error }}</div>

    <button type="submit" [disabled]="!form.valid || loading">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </form>
</div>
